{% from "macros/detail_sections.html" import render_detail_sections %}
{% if selected_task %}
<aside class="task-detail" id="task-detail">
  <h2 class="detail-title">{{ selected_task.description }}</h2>
  {{ render_detail_sections(task_detail_sections, project) }}

  <div class="detail-actions">
    {% if selected_task.state == 'ready' %}
    <form hx-post="/api/tasks/claim" hx-target="#tasks-toast" hx-swap="innerHTML">
      <input type="hidden" name="task_id" value="{{ selected_task.task_id }}">
      <input type="hidden" name="project_id" value="{{ project.project_id }}">
      <input type="hidden" name="workspace_id" value="{{ project.workspace_id }}">
      <input type="hidden" name="filter" value="{{ nav.task_filter }}">
      <input type="hidden" name="page" value="{{ tasks_page.page }}">
      <input type="hidden" name="sort" value="{{ sort_column }}">
      <input type="hidden" name="sort_dir" value="{{ sort_dir }}">
      <button type="submit" class="btn btn-primary">Reclamar</button>
    </form>
    {% endif %}
    <form hx-post="/api/tasks/start" hx-target="#tasks-toast" hx-swap="innerHTML">
      <input type="hidden" name="task_id" value="{{ selected_task.task_id }}">
      <input type="hidden" name="project_id" value="{{ project.project_id }}">
      <input type="hidden" name="workspace_id" value="{{ project.workspace_id }}">
      <input type="hidden" name="filter" value="{{ nav.task_filter }}">
      <input type="hidden" name="page" value="{{ tasks_page.page }}">
      <input type="hidden" name="sort" value="{{ sort_column }}">
      <input type="hidden" name="sort_dir" value="{{ sort_dir }}">
      <button type="submit" class="btn btn-ghost">Iniciar</button>
    </form>
    <form hx-post="/api/tasks/block" hx-target="#tasks-toast" hx-swap="innerHTML">
      <input type="hidden" name="task_id" value="{{ selected_task.task_id }}">
      <input type="hidden" name="project_id" value="{{ project.project_id }}">
      <input type="hidden" name="workspace_id" value="{{ project.workspace_id }}">
      <input type="hidden" name="filter" value="{{ nav.task_filter }}">
      <input type="hidden" name="page" value="{{ tasks_page.page }}">
      <input type="hidden" name="sort" value="{{ sort_column }}">
      <input type="hidden" name="sort_dir" value="{{ sort_dir }}">
      <button type="submit" class="btn btn-ghost">Bloquear</button>
    </form>
    <form hx-post="/api/tasks/done" hx-target="#tasks-toast" hx-swap="innerHTML">
      <input type="hidden" name="task_id" value="{{ selected_task.task_id }}">
      <input type="hidden" name="project_id" value="{{ project.project_id }}">
      <input type="hidden" name="workspace_id" value="{{ project.workspace_id }}">
      <input type="hidden" name="filter" value="{{ nav.task_filter }}">
      <input type="hidden" name="page" value="{{ tasks_page.page }}">
      <input type="hidden" name="sort" value="{{ sort_column }}">
      <input type="hidden" name="sort_dir" value="{{ sort_dir }}">
      <button type="submit" class="btn btn-ghost">Completar</button>
    </form>
    <form hx-post="/api/tasks/release" hx-target="#tasks-toast" hx-swap="innerHTML">
      <input type="hidden" name="task_id" value="{{ selected_task.task_id }}">
      <input type="hidden" name="project_id" value="{{ project.project_id }}">
      <input type="hidden" name="workspace_id" value="{{ project.workspace_id }}">
      <input type="hidden" name="filter" value="{{ nav.task_filter }}">
      <input type="hidden" name="page" value="{{ tasks_page.page }}">
      <input type="hidden" name="sort" value="{{ sort_column }}">
      <input type="hidden" name="sort_dir" value="{{ sort_dir }}">
      <button type="submit" class="btn btn-ghost">Liberar</button>
    </form>
  </div>
</aside>
{% else %}
<aside class="task-detail task-detail--empty" id="task-detail">
  <p class="muted">Selecciona una tarea de la tabla.</p>
</aside>
{% endif %}
