schema: spec-driven

context: |
  Project: CapiForge
  State: Python V1.1 owner-local bootstrap CLI with archived OpenSpec changes and active node/coordinator runtime modules.
  Tech stack: Python 3 stdlib, SQLite schemas, argparse CLI, Markdown/OpenSpec artifacts.
  Architecture: Local-first owner-node system with deterministic entrypoint indexes and a thin non-authoritative coordinator for enrollment, claims, and routed visibility.
  Testing: 76 stdlib unittest cases via repo-root load_tests shim; unit, integration, and e2e layers exist; no coverage or quality-tool config detected.
  Style: Technical artifacts in English.

strict_tdd: false

testing:
  detected: 2026-06-19
  strict_tdd: false
  runner:
    available: true
    framework: unittest
    command: python3 -m unittest
  layers:
    unit:
      available: true
      tool: unittest
    integration:
      available: true
      tool: unittest
    e2e:
      available: true
      tool: unittest
  coverage:
    available: false
    command: ""
  quality:
    linter:
      available: false
      command: ""
    type_checker:
      available: false
      command: ""
    formatter:
      available: false
      command: ""

rules:
  proposal:
    - Define security boundaries, trust assumptions, and rollback plan.
    - Explain local-first and shared-MCP tradeoffs explicitly.
  specs:
    - Use Given/When/Then for scenarios.
    - Use RFC 2119 keywords (MUST, SHOULD, MAY).
    - State machine and machine-sync behavior MUST be explicit.
  design:
    - Document threat model, credential storage, and trust boundaries.
    - Include architecture rationale for local-first persistence and MCP sharing.
  tasks:
    - Group by phase and keep each task completable in one session.
    - Create foundational security tasks before feature expansion.
    - Keep proposed review slices near 400 lines and ask before chained PR splits.
  apply:
    - Follow the existing stdlib-first Python, SQLite, and JSON-envelope CLI patterns; do not add dependencies without spec/design justification.
    tdd: false
    test_command: python3 -m unittest
  verify:
    test_command: python3 -m unittest
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas.
