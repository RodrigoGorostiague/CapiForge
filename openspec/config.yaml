schema: spec-driven

context: |
  Project: CapiForge
  State: Python V1 runtime bootstrap with implemented node/coordinator modules and archived first change.
  Tech stack: Python stdlib runtime, SQLite schemas, Markdown contracts/specs.
  Architecture: Local-first multi-node system with one canonical owner node per project and a thin non-authoritative coordinator.
  Testing: unittest suite via repo-root discovery shim; no coverage or quality-tool config detected.
  Style: Technical artifacts in English.

strict_tdd: false

testing:
  detected: 2026-06-19
  strict_tdd: false
  runner:
    available: true
    framework: unittest
    command: python3 -m unittest
  layers:
    unit:
      available: true
      tool: unittest
    integration:
      available: true
      tool: unittest
    e2e:
      available: true
      tool: unittest
  coverage:
    available: false
    command: ""
  quality:
    linter:
      available: false
      command: ""
    type_checker:
      available: false
      command: ""
    formatter:
      available: false
      command: ""

rules:
  proposal:
    - Define security boundaries, trust assumptions, and rollback plan.
    - Explain local-first and shared-MCP tradeoffs explicitly.
  specs:
    - Use Given/When/Then for scenarios.
    - Use RFC 2119 keywords (MUST, SHOULD, MAY).
    - State machine and machine-sync behavior MUST be explicit.
  design:
    - Document threat model, credential storage, and trust boundaries.
    - Include architecture rationale for local-first persistence and MCP sharing.
  tasks:
    - Group by phase and keep each task completable in one session.
    - Create foundational security tasks before feature expansion.
  apply:
    - Follow the existing stdlib-first Python and SQLite patterns; do not add dependencies without spec/design justification.
    tdd: false
    test_command: python3 -m unittest
  verify:
    test_command: python3 -m unittest
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas.
